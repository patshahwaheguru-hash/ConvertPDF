name: pdf_converter
description: Convert JPG and Excel files to PDF
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^6.2.1
  printing: ^5.14.3
  pdf: ^3.11.1
  share_plus: ^7.2.2
  excel: ^4.0.6
  image: ^4.3.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
