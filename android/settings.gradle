pluginManagement {
    // 1. Keep variable initialization isolated here for internal use
    def flutterSdkPath = {
        def properties = new Properties()
        def propertiesFile = new File(settingsDir, "local.properties")
        if (propertiesFile.exists()) {
            propertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
        }
        def sdkPath = properties.getProperty("flutter.sdk")
        assert sdkPath != null, "flutter.sdk not set in local.properties"
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "com.android.application" version "8.1.0" apply false
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

include ':app'

// 2. Read the property cleanly by safely extracting it from settings providers
def properties = new Properties()
def propertiesFile = new File(settingsDir, "local.properties")
if (propertiesFile.exists()) {
    propertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
}
def extractedPath = properties.getProperty("flutter.sdk")

def flutterProjectRoot = rootProject.projectDir.parentFile
def pluginsFile = new File(flutterProjectRoot, '.flutter-plugins-dependencies')
if (pluginsFile.exists() && extractedPath != null) {
    apply from: "$extractedPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"
}
