include ':app'

def localPropertiesFile = new File(rootDir, "local.properties")
def properties = new Properties()
assert localPropertiesFile.exists(), "local.properties not found"
localPropertiesFile.withInputStream { properties.load(it) }

def flutterToolsPath = properties.getProperty("flutter.sdk")
assert flutterToolsPath != null, "flutter.sdk not set in local.properties"
apply from: "$flutterToolsPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"
