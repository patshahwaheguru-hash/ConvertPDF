workflows:
  convertpdf-playstore:
    name: Android App Bundle Build
    max_build_duration: 60
    environment:
      # FORCE Java 17 to match modern Flutter/Gradle versions
      java: 17
      flutter: 3.19.6 
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean project cache
        script: |
          flutter clean
      - name: Fetch project dependencies
        script: |
          flutter pub get
      - name: Build Android App Bundle (AAB)
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
