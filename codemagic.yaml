workflows:
  android-workflow:
    name: Android App Bundle Build
    max_build_duration: 60
    environment:
      # DO NOT just use 'stable'. Force an explicit, reliable 3.x version:
      flutter: 3.19.6 
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean project cache
        script: |
          flutter clean
      - name: Fetch project dependencies
        script: |
          flutter pub get
      - name: Build Android App Bundle (AAB)
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      
